<div class="container-fluid p-4" style="background-color: #f4f9fc; min-height: 100vh;">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card border-0 shadow-sm">
        <div class="card-header" style="background-color: #eaf4fb;">
          <h4 class="fw-bold mb-0" style="color: #1a2b3c;">{{ esEdicion ? 'Editar Establecimiento' : 'Nuevo Establecimiento' }}</h4>
        </div>
        <div class="card-body">

          <div class="alert alert-danger" [hidden]="!error">{{ error }}</div>

          <form #establecimientoForm="ngForm" (ngSubmit)="guardar()">
            <div class="mb-3">
              <label class="form-label fw-semibold">Nombre</label>
              <input type="text" class="form-control" name="nombre"
                     [(ngModel)]="establecimiento().nombre" required>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Dirección</label>
              <input type="text" class="form-control" name="direccion"
                     [(ngModel)]="establecimiento().direccion" required>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">Tipo</label>
                <select class="form-select" name="tipo"
                        [(ngModel)]="establecimiento().tipo" required>
                  <option value="" disabled>Seleccione un tipo</option>
                  <option value="Centro de Salud">Centro de Salud</option>
                  <option value="Hospital">Hospital</option>
                  <option value="Clínica">Clínica</option>
                  <option value="Posta Médica">Posta Médica</option>
                </select>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">ID Ubicación</label>
                <input type="number" class="form-control" name="id_ubicacion"
                       [(ngModel)]="establecimiento().id_ubicacion" required>
              </div>
            </div>

            <div class="d-flex justify-content-end gap-2 mt-3">
              <button type="button" class="btn btn-secondary" (click)="cancelar()">Cancelar</button>
              <button type="submit" class="btn btn-info text-white fw-semibold" [disabled]="!establecimientoForm.valid">
                Guardar
              </button>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>
