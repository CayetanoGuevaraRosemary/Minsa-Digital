<div class="container-fluid p-4" style="background-color: #f4f9fc; min-height: 100vh;">

  <button class="btn btn-link text-decoration-none px-0 mb-3" (click)="volver()">
    <i class="bi bi-arrow-left"></i> Volver al panel
  </button>

  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h3 class="fw-bold mb-0" style="color: #1a2b3c;">Médicos Registrados</h3>
      <p class="text-muted mb-0">Gestión de médicos de Minsa Digital</p>
    </div>
    <button class="btn btn-info text-white fw-semibold" (click)="nuevoMedico()">
      Nuevo Médico
    </button>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead>
            <tr style="background-color: #eaf4fb;">
              <th class="ps-3" style="color: #1a2b3c;">ID</th>
              <th style="color: #1a2b3c;">Nombres</th>
              <th style="color: #1a2b3c;">Apellidos</th>
              <th style="color: #1a2b3c;">CMP</th>
              <th style="color: #1a2b3c;">Especialidad</th>
              <th class="text-end pe-3" style="color: #1a2b3c;">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of listaMedicos()">
              <td class="ps-3">{{ item.id_medico }}</td>
              <td>{{ item.nombres }}</td>
              <td>{{ item.apellidos }}</td>
              <td>{{ item.cmp }}</td>
              <td>{{ item.especialidad }}</td>
              <td class="text-end pe-3">
                <button class="btn btn-sm btn-outline-primary me-1" (click)="editarMedico(item.id_medico)">
                  <i class="bi bi-pencil-fill"></i>
                </button>
                <button class="btn btn-sm btn-outline-danger" (click)="eliminarMedico(item.id_medico)">
                  <i class="bi bi-trash-fill"></i>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>
