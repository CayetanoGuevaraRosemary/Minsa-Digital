<div class="container-fluid p-4" style="background-color: #f4f9fc; min-height: 100vh;">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card border-0 shadow-sm">
        <div class="card-header" style="background-color: #eaf4fb;">
          <h4 class="fw-bold mb-0" style="color: #1a2b3c;">{{ esEdicion ? 'Editar Médico' : 'Nuevo Médico' }}</h4>
        </div>
        <div class="card-body">

          <div class="alert alert-danger" [hidden]="!error">{{ error }}</div>

          <form #medicoForm="ngForm" (ngSubmit)="guardar()">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">Nombres</label>
                <input type="text" class="form-control" name="nombres"
                       [(ngModel)]="medico().nombres" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">Apellidos</label>
                <input type="text" class="form-control" name="apellidos"
                       [(ngModel)]="medico().apellidos" required>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">CMP</label>
                <input type="text" class="form-control" name="cmp"
                       [(ngModel)]="medico().cmp" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">Especialidad</label>
                <select class="form-select" name="id_especialidad"
                        [(ngModel)]="medico().id_especialidad" required>
                  <option value="0" disabled>Seleccione una especialidad</option>
                  <option *ngFor="let esp of especialidades" [value]="esp.id_especialidad">
                    {{ esp.nombre }}
                  </option>
                </select>
              </div>
            </div>

            <div class="d-flex justify-content-end gap-2 mt-3">
              <button type="button" class="btn btn-secondary" (click)="cancelar()">Cancelar</button>
              <button type="submit" class="btn btn-info text-white fw-semibold" [disabled]="!medicoForm.valid">
                Guardar
              </button>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>
