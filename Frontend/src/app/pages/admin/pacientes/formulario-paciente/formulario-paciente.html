<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0">{{ esEdicion ? 'Editar Paciente' : 'Nuevo Paciente' }}</h4>
        </div>
        <div class="card-body">

          <div class="alert alert-danger" [hidden]="!error">{{ error }}</div>
          
          <form #pacienteForm="ngForm" (ngSubmit)="guardar()">
            <div class="row">
              <div class="col-md-4 mb-3">
                <label class="form-label">Tipo de Documento</label>
                <select class="form-select" name="tipo_documento" [(ngModel)]="paciente().tipo_documento" required>
                  <option value="">Seleccione...</option>
                  <option value="DNI">DNI</option>
                  <option value="CE">Carné de Extranjería</option>
                  <option value="Pasaporte">Pasaporte</option>
                </select>
              </div>
              <div class="col-md-8 mb-3">
                <label class="form-label">N° de Documento</label>
                <input type="text" class="form-control" name="numero_documento" [(ngModel)]="paciente().numero_documento" required>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Nombres</label>
                <input type="text" class="form-control" name="nombres" [(ngModel)]="paciente().nombres" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Apellidos</label>
                <input type="text" class="form-control" name="apellidos" [(ngModel)]="paciente().apellidos" required>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Fecha de Nacimiento</label>
                <input type="date" class="form-control" name="fecha_nacimiento" [(ngModel)]="paciente().fecha_nacimiento" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" name="password_hash" [(ngModel)]="paciente().password_hash" required>
              </div>
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-3">
              <button type="button" class="btn btn-secondary" (click)="cancelar()">Cancelar</button>
              <button type="submit" class="btn btn-primary" [disabled]="!pacienteForm.valid">
                <i class="bi bi-save me-1"></i>Guardar
              </button>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>
