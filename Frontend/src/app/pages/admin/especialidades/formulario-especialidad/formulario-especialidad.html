<div class="container-fluid p-4" style="background-color: #f4f9fc; min-height: 100vh;">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card border-0 shadow-sm">
        <div class="card-header" style="background-color: #eaf4fb;">
          <h4 class="fw-bold mb-0" style="color: #1a2b3c;">{{ esEdicion ? 'Editar Especialidad' : 'Nueva Especialidad' }}</h4>
        </div>
        <div class="card-body">

          <div class="alert alert-danger" [hidden]="!error">{{ error }}</div>

          <form #especialidadForm="ngForm" (ngSubmit)="guardar()">
            <div class="mb-3">
              <label class="form-label fw-semibold">Nombre</label>
              <input type="text" class="form-control" name="nombre"
                     [(ngModel)]="especialidad().nombre" required>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Descripción</label>
              <textarea class="form-control" name="descripcion" rows="3"
                        [(ngModel)]="especialidad().descripcion" required></textarea>
            </div>

            <div class="d-flex justify-content-end gap-2 mt-3">
              <button type="button" class="btn btn-secondary" (click)="cancelar()">Cancelar</button>
              <button type="submit" class="btn btn-info text-white fw-semibold" [disabled]="!especialidadForm.valid">
                Guardar
              </button>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>
