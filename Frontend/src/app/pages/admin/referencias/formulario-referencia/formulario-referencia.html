<div class="container-fluid p-4" style="background-color: #f4f9fc; min-height: 100vh;">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card border-0 shadow-sm">
        <div class="card-header" style="background-color: #eaf4fb;">
          <h4 class="fw-bold mb-0" style="color: #1a2b3c;">Nueva Referencia Médica</h4>
        </div>
        <div class="card-body">

          <div class="alert alert-danger" [hidden]="!error">{{ error }}</div>

          <form #referenciaForm="ngForm" (ngSubmit)="guardar()">

            <div class="mb-3">
              <label class="form-label fw-semibold">ID Paciente</label>
              <input type="number" class="form-control" name="id_paciente"
                     [(ngModel)]="referencia().id_paciente" required>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">Establecimiento Origen</label>
                <select class="form-select" name="id_establecimiento_origen"
                        [(ngModel)]="referencia().id_establecimiento_origen" required>
                  <option value="0" disabled>Seleccione origen</option>
                  <option *ngFor="let e of establecimientos" [value]="e.id_establecimiento">
                    {{ e.nombre }}
                  </option>
                </select>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">Establecimiento Destino</label>
                <select class="form-select" name="id_establecimiento_destino"
                        [(ngModel)]="referencia().id_establecimiento_destino" required>
                  <option value="0" disabled>Seleccione destino</option>
                  <option *ngFor="let e of establecimientos" [value]="e.id_establecimiento">
                    {{ e.nombre }}
                  </option>
                </select>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Especialidad requerida</label>
              <select class="form-select" name="id_especialidad"
                      [(ngModel)]="referencia().id_especialidad" required>
                <option value="0" disabled>Seleccione especialidad</option>
                <option *ngFor="let esp of especialidades" [value]="esp.id_especialidad">
                  {{ esp.nombre }}
                </option>
              </select>
            </div>

            <div class="d-flex justify-content-end gap-2 mt-3">
              <button type="button" class="btn btn-secondary" (click)="cancelar()">Cancelar</button>
              <button type="submit" class="btn btn-info text-white fw-semibold" [disabled]="!referenciaForm.valid">
                Guardar
              </button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
