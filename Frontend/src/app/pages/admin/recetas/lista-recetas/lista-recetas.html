<div class="container-fluid p-4" style="background-color: #f4f9fc; min-height: 100vh">
  <button class="btn btn-link text-decoration-none px-0 mb-3" (click)="volver()">
    <i class="bi bi-arrow-left"></i> Volver al panel
  </button>

  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h3 class="fw-bold mb-0" style="color: #1a2b3c">Recetas Médicas</h3>
      <p class="text-muted mb-0">Gestión de recetas de Minsa Digital</p>
    </div>
    <button class="btn btn-info text-white fw-semibold" (click)="nuevaReceta()">
      <i class="bi bi-plus-lg me-1"></i>Nueva Receta
    </button>
  </div>

  <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover table-striped align-middle mb-0">
          <thead class="table-dark">
            <tr>
              <th class="ps-3 text-white text-uppercase small fw-semibold">ID</th>
              <th class="text-white text-uppercase small fw-semibold">ID Cita</th>
              <th class="text-white text-uppercase small fw-semibold">ID Paciente</th>
              <th class="text-white text-uppercase small fw-semibold">Estado</th>
              <th class="text-white text-uppercase small fw-semibold">Observaciones</th>
              <th class="text-end pe-3 text-white text-uppercase small fw-semibold">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of listaRecetas()">
              <td class="ps-3">{{ item.id_receta }}</td>
              <td>{{ item.id_cita }}</td>
              <td>{{ item.id_paciente }}</td>
              <td>
                <span
                  class="badge rounded-pill"
                  [class.bg-warning]="item.estado_dispensacion === 'pendiente'"
                  [class.bg-success]="item.estado_dispensacion === 'dispensada'"
                  [class.text-dark]="item.estado_dispensacion === 'pendiente'"
                >
                  {{ item.estado_dispensacion }}
                </span>
              </td>
              <td>{{ item.observaciones }}</td>
              <td class="text-end pe-3">
                <button class="btn btn-sm btn-outline-primary" (click)="verDetalle(item.id_receta)">
                  <i class="bi bi-eye-fill"></i>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
