<div class="container-fluid p-4" style="background-color: #f4f9fc; min-height: 100vh">
  <button class="btn btn-link text-decoration-none px-0 mb-3" (click)="volver()">
    <i class="bi bi-arrow-left"></i> Volver al panel
  </button>

  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h3 class="fw-bold mb-0" style="color: #1a2b3c">Medicamentos Registrados</h3>
      <p class="text-muted mb-0">Gestión de medicamentos de Minsa Digital</p>
    </div>
    <button class="btn btn-info text-white fw-semibold" (click)="nuevoMedicamento()">
      <i class="bi bi-plus-lg me-1"></i>Nuevo Medicamento
    </button>
  </div>

  <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover table-striped align-middle mb-0">
          <thead class="table-dark">
            <tr>
              <th class="ps-3 text-white text-uppercase small fw-semibold">ID</th>
              <th class="text-white text-uppercase small fw-semibold">Nombre</th>
              <th class="text-white text-uppercase small fw-semibold">Presentación</th>
              <th class="text-white text-uppercase small fw-semibold">Concentración</th>
              <th class="text-end pe-3 text-white text-uppercase small fw-semibold">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of listaMedicamentos()">
              <td class="ps-3">{{ item.id_medicamento }}</td>
              <td>{{ item.nombre }}</td>
              <td>{{ item.presentacion }}</td>
              <td>{{ item.concentracion }}</td>
              <td class="text-end pe-3">
                <button
                  class="btn btn-sm btn-outline-primary me-1"
                  (click)="editarMedicamento(item.id_medicamento)"
                >
                  <i class="bi bi-pencil-fill"></i>
                </button>
                <button
                  class="btn btn-sm btn-outline-danger"
                  (click)="eliminarMedicamento(item.id_medicamento)"
                >
                  <i class="bi bi-trash-fill"></i>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
