<div class="container-fluid p-4" style="background-color: #f4f9fc; min-height: 100vh;">

  <button class="btn btn-link text-decoration-none px-0 mb-3" (click)="volver()">
    <i class="bi bi-arrow-left"></i> Volver al panel
  </button>

  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h3 class="fw-bold mb-0" style="color: #1a2b3c;">Citas Médicas</h3>
      <p class="text-muted mb-0">Gestión de citas de Minsa Digital</p>
    </div>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead>
            <tr style="background-color: #eaf4fb;">
              <th class="ps-3" style="color: #1a2b3c;">ID</th>
              <th style="color: #1a2b3c;">Paciente</th>
              <th style="color: #1a2b3c;">Médico</th>
              <th style="color: #1a2b3c;">Fecha</th>
              <th style="color: #1a2b3c;">Hora</th>
              <th style="color: #1a2b3c;">Tipo</th>
              <th style="color: #1a2b3c;">Estado</th>
              <th class="text-end pe-3" style="color: #1a2b3c;">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of listaCitas()">
              <td class="ps-3">{{ item.id_cita }}</td>
              <td>{{ item.paciente }}</td>
              <td>{{ item.medico }}</td>
              <td>{{ item.fecha | date:'dd/MM/yyyy' }}</td>
              <td>{{ item.hora }}</td>
              <td>{{ item.tipo_cita }}</td>
              <td>
                <span class="badge"
                  [class.bg-warning]="item.estado_cita === 'pendiente'"
                  [class.bg-success]="item.estado_cita === 'confirmada'"
                  [class.bg-danger]="item.estado_cita === 'cancelada'"
                  [class.text-dark]="item.estado_cita === 'pendiente'">
                  {{ item.estado_cita }}
                </span>
              </td>
              <td class="text-end pe-3">
                <button class="btn btn-sm btn-outline-success me-1"
                  [hidden]="item.estado_cita === 'confirmada'"
                  (click)="cambiarEstado(item.id_cita, 'confirmada')">
                  <i class="bi bi-check-lg"></i>
                </button>
                <button class="btn btn-sm btn-outline-warning me-1"
                  [hidden]="item.estado_cita === 'cancelada'"
                  (click)="cambiarEstado(item.id_cita, 'cancelada')">
                  <i class="bi bi-x-lg"></i>
                </button>
                <button class="btn btn-sm btn-outline-danger"
                  (click)="eliminarCita(item.id_cita)">
                  <i class="bi bi-trash-fill"></i>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>
