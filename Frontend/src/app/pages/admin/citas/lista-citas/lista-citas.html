<div class="container-fluid p-4" style="background-color: #f4f9fc; min-height: 100vh">
  <button class="btn btn-link text-decoration-none px-0 mb-3" (click)="volver()">
    <i class="bi bi-arrow-left"></i> Volver al panel
  </button>

  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h3 class="fw-bold mb-0" style="color: #1a2b3c">Citas Médicas</h3>
      <p class="text-muted mb-0">Gestión de citas de Minsa Digital</p>
    </div>
  </div>

  <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover table-striped align-middle mb-0">
          <thead class="table-dark">
            <tr>
              <th class="ps-3 text-white text-uppercase small fw-semibold">ID</th>
              <th class="text-white text-uppercase small fw-semibold">Paciente</th>
              <th class="text-white text-uppercase small fw-semibold">Médico</th>
              <th class="text-white text-uppercase small fw-semibold">Fecha</th>
              <th class="text-white text-uppercase small fw-semibold">Hora</th>
              <th class="text-white text-uppercase small fw-semibold">Tipo</th>
              <th class="text-white text-uppercase small fw-semibold">Estado</th>
              <th class="text-end pe-3 text-white text-uppercase small fw-semibold">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of listaCitas()">
              <td class="ps-3">{{ item.id_cita }}</td>
              <td>{{ item.paciente }}</td>
              <td>{{ item.medico }}</td>
              <td>{{ item.fecha | date: 'dd/MM/yyyy' }}</td>
              <td>{{ item.hora }}</td>
              <td>{{ item.tipo_cita }}</td>
              <td>
                <span
                  class="badge rounded-pill"
                  [class.bg-warning]="item.estado_cita === 'pendiente'"
                  [class.bg-success]="item.estado_cita === 'confirmada'"
                  [class.bg-info]="item.estado_cita === 'atendida'"
                  [class.bg-danger]="item.estado_cita === 'cancelada'"
                  [class.text-dark]="item.estado_cita === 'pendiente' || item.estado_cita === 'atendida'"
                >
                  {{ item.estado_cita }}
                </span>
              </td>
              <td class="text-end pe-3">
                <button
                  class="btn btn-sm btn-outline-success me-1"
                  [hidden]="item.estado_cita === 'confirmada' || item.estado_cita === 'atendida'"
                  (click)="cambiarEstado(item.id_cita, 'confirmada')"
                >
                  <i class="bi bi-check-lg"></i>
                </button>
                <button
                  class="btn btn-sm btn-outline-info me-1"
                  [hidden]="item.estado_cita !== 'confirmada'"
                  (click)="cambiarEstado(item.id_cita, 'atendida')"
                  title="Marcar como atendida"
                >
                  <i class="bi bi-clipboard2-check"></i>
                </button>
                <button
                  class="btn btn-sm btn-outline-primary me-1"
                  [hidden]="item.estado_cita !== 'atendida'"
                  (click)="agregarReceta(item)"
                  title="Agregar receta"
                >
                  <i class="bi bi-file-earmark-medical"></i>
                </button>
                <button
                  class="btn btn-sm btn-outline-warning me-1"
                  [hidden]="item.estado_cita === 'cancelada'"
                  (click)="cambiarEstado(item.id_cita, 'cancelada')"
                >
                  <i class="bi bi-x-lg"></i>
                </button>
                <button class="btn btn-sm btn-outline-danger" (click)="eliminarCita(item.id_cita)">
                  <i class="bi bi-trash-fill"></i>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
