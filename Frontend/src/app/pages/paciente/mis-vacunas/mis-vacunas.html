<div class="container-fluid p-4" style="background-color: #f4f9fc; min-height: 100vh;">

  <button class="btn btn-link text-decoration-none px-0 mb-3" (click)="volver()">
    <i class="bi bi-arrow-left"></i> Volver al inicio
  </button>

  <div class="mb-4">
    <h3 class="fw-bold mb-0" style="color: #1a2b3c;">Mis Vacunas</h3>
    <p class="text-muted mb-0">Historial de tu carné de vacunación</p>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead>
            <tr style="background-color: #eaf4fb;">
              <th class="ps-3" style="color: #1a2b3c;">ID</th>
              <th style="color: #1a2b3c;">Vacuna</th>
              <th style="color: #1a2b3c;">Tipo Carné</th>
              <th style="color: #1a2b3c;">Dosis</th>
              <th style="color: #1a2b3c;">Fecha Aplicación</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of misVacunas()">
              <td class="ps-3">{{ item.id_vacuna }}</td>
              <td>{{ item.nombre_vacuna }}</td>
              <td>{{ item.tipo_carne }}</td>
              <td>{{ item.dosis }}</td>
              <td>{{ item.fecha_aplicacion | date:'dd/MM/yyyy' }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>
