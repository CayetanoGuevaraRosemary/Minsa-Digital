<div class="container-fluid p-4" style="background-color: #f4f9fc; min-height: 100vh;">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card border-0 shadow-sm">
        <div class="card-header" style="background-color: #eaf4fb;">
          <h4 class="fw-bold mb-0" style="color: #1a2b3c;">Reservar Cita Médica</h4>
        </div>
        <div class="card-body">

          <div class="alert alert-danger" [hidden]="!error">{{ error }}</div>

          <form #reservarForm="ngForm" (ngSubmit)="guardar()">

            <div class="mb-3">
              <label class="form-label fw-semibold">Cupo disponible</label>
              <select class="form-select" name="id_cupo"
                      [(ngModel)]="cita().id_cupo" required>
                <option value="0" disabled>Seleccione un cupo</option>
                <option *ngFor="let c of cupos" [value]="c.id_cupo">
                  Médico {{ c.id_medico }} — {{ c.fecha | date:'dd/MM/yyyy' }} {{ c.hora }} ({{ c.tipo_cita }})
                </option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Tipo de cita</label>
              <select class="form-select" name="tipo_cita"
                      [(ngModel)]="cita().tipo_cita" required>
                <option value="" disabled>Seleccione tipo</option>
                <option value="presencial">Presencial</option>
                <option value="teleconsulta">Teleconsulta</option>
              </select>
            </div>

            <div class="d-flex justify-content-end gap-2 mt-3">
              <button type="button" class="btn btn-secondary" (click)="cancelar()">Cancelar</button>
              <button type="submit" class="btn btn-info text-white fw-semibold" [disabled]="!reservarForm.valid">
                Confirmar Reserva
              </button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
