<div class="container-fluid p-4" style="background-color: #f4f9fc; min-height: 100vh;">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h3 class="fw-bold mb-0" style="color: #1a2b3c;">
        Hola, {{ nombrePaciente }}
      </h3>
      <p class="text-muted mb-0">Bienvenido a tu espacio en Minsa Digital</p>
    </div>
    <button class="btn btn-outline-secondary" (click)="cerrarSesion()">
      Cerrar sesión
    </button>
  </div>

  <div class="row g-3">

    <div class="col-md-4">
      <div class="card border-0 shadow-sm h-100" role="button" (click)="irA('/paciente/reservar')">
        <div class="card-body">
          <i class="bi bi-calendar-plus fs-2 text-info"></i>
          <h5 class="fw-bold mt-2" style="color: #1a2b3c;">Reservar Cita</h5>
          <p class="text-muted mb-0">Agenda tu próxima cita médica</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card border-0 shadow-sm h-100" role="button" (click)="irA('/paciente/mis-citas')">
        <div class="card-body">
          <i class="bi bi-calendar-check fs-2 text-info"></i>
          <h5 class="fw-bold mt-2" style="color: #1a2b3c;">Mis Citas</h5>
          <p class="text-muted mb-0">Revisa el estado de tus citas</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card border-0 shadow-sm h-100" role="button" (click)="irA('/paciente/mis-recetas')">
        <div class="card-body">
          <i class="bi bi-capsule fs-2 text-info"></i>
          <h5 class="fw-bold mt-2" style="color: #1a2b3c;">Mis Recetas</h5>
          <p class="text-muted mb-0">Consulta tus recetas médicas</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card border-0 shadow-sm h-100" role="button" (click)="irA('/paciente/mis-vacunas')">
        <div class="card-body">
          <i class="bi bi-clipboard2-pulse fs-2 text-info"></i>
          <h5 class="fw-bold mt-2" style="color: #1a2b3c;">Mis Vacunas</h5>
          <p class="text-muted mb-0">Consulta tu carné de vacunación</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card border-0 shadow-sm h-100" role="button" (click)="irA('/paciente/mis-referencias')">
        <div class="card-body">
          <i class="bi bi-arrow-left-right fs-2 text-info"></i>
          <h5 class="fw-bold mt-2" style="color: #1a2b3c;">Mis Referencias</h5>
          <p class="text-muted mb-0">Consulta tus referencias médicas</p>
        </div>
      </div>
    </div>

  </div>

</div>
