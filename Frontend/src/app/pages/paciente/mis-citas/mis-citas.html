<div class="container-fluid p-4" style="background-color: #f4f9fc; min-height: 100vh;">

  <button class="btn btn-link text-decoration-none px-0 mb-3" (click)="volver()">
    <i class="bi bi-arrow-left"></i> Volver al inicio
  </button>

  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h3 class="fw-bold mb-0" style="color: #1a2b3c;">Mis Citas</h3>
      <p class="text-muted mb-0">Historial y estado de tus citas médicas</p>
    </div>
    <button class="btn btn-info text-white fw-semibold" (click)="reservar()">
      Reservar Cita
    </button>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead>
            <tr style="background-color: #eaf4fb;">
              <th class="ps-3" style="color: #1a2b3c;">ID</th>
              <th style="color: #1a2b3c;">Tipo</th>
              <th style="color: #1a2b3c;">Estado</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of misCitas()">
              <td class="ps-3">{{ item.id_cita }}</td>
              <td>{{ item.tipo_cita }}</td>
              <td>
                <span class="badge"
                  [class.bg-warning]="item.estado_cita === 'pendiente'"
                  [class.bg-success]="item.estado_cita === 'confirmada'"
                  [class.bg-danger]="item.estado_cita === 'cancelada'"
                  [class.text-dark]="item.estado_cita === 'pendiente'">
                  {{ item.estado_cita }}
                </span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>
